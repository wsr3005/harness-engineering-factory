name: Doc Validation
on:
  pull_request:
    paths:
      - 'docs/**'
      - '*.md'
      - 'apps/**/AGENTS.md'
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: npx tsx scripts/doc-validate.ts --strict
