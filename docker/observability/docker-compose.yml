services:
  vector:
    image: timberio/vector:0.43.1-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-harness}-vector
    ports:
      - '${OTLP_HTTP_PORT:-4318}:4318'
    environment:
      HARNESS_WORKTREE: ${HARNESS_WORKTREE:-default}
    volumes:
      - ./vector.yaml:/etc/vector/vector.yaml:ro
    depends_on:
      - victoria-logs
      - victoria-metrics
      - victoria-traces

  victoria-logs:
    image: victoriametrics/victoria-logs:v1.3.1-victorialogs
    container_name: ${COMPOSE_PROJECT_NAME:-harness}-victoria-logs
    command:
      - '-retentionPeriod=7d'
    ports:
      - '${VICTORIA_LOGS_PORT:-9428}:9428'

  victoria-metrics:
    image: victoriametrics/victoria-metrics:v1.108.1
    container_name: ${COMPOSE_PROJECT_NAME:-harness}-victoria-metrics
    command:
      - '-retentionPeriod=7d'
    ports:
      - '${VICTORIA_METRICS_PORT:-8428}:8428'

  victoria-traces:
    image: victoriametrics/victoria-metrics:v1.108.1
    container_name: ${COMPOSE_PROJECT_NAME:-harness}-victoria-traces
    command:
      - '-retentionPeriod=7d'
    ports:
      - '${VICTORIA_TRACES_PORT:-8429}:8428'
